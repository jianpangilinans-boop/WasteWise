<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BinDay Notifier</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-50 to-emerald-50 min-h-screen p-6">

<div class="max-w-6xl mx-auto">

    <!-- BACK -->
    <a href="index.html" class="text-green-700 hover:underline mb-4 inline-block">← Back</a>

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-green-900">
                BinDay Notifier 
                <span id="badge" class="ml-2 bg-orange-500 text-white text-sm px-2 py-1 rounded hidden"></span>
            </h1>
            <p class="text-green-600">Stay updated with collection schedules and alerts</p>
        </div>

        <button onclick="markAllAsRead()" id="markAllBtn"
            class="border border-green-600 text-green-600 px-3 py-1 rounded hidden">
            ✔ Mark All as Read
        </button>
    </div>

    <div class="grid lg:grid-cols-3 gap-6">

        <!-- NOTIFICATIONS -->
        <div class="lg:col-span-2 space-y-4" id="notifications"></div>

        <!-- SETTINGS -->
        <div class="space-y-6">

            <div class="bg-white p-4 rounded-lg shadow border">
                <h2 class="font-bold mb-2">Notification Settings</h2>

                <label class="flex justify-between mb-2">
                    Email Notifications
                    <input type="checkbox" checked>
                </label>

                <label class="flex justify-between mb-2">
                    SMS Notifications
                    <input type="checkbox" checked>
                </label>

                <hr class="my-3">

                <label class="flex justify-between mb-2">
                    Day Before Reminder
                    <input type="checkbox" checked>
                </label>

                <label class="flex justify-between mb-2">
                    Morning Reminder
                    <input type="checkbox" checked>
                </label>

                <label class="flex justify-between">
                    Schedule Changes
                    <input type="checkbox" checked>
                </label>
            </div>

            <!-- UPCOMING -->
            <div class="bg-green-50 p-4 rounded-lg border">
                <h2 class="font-bold mb-2">Next Collections</h2>

                <div class="bg-white p-2 rounded mb-2">
                    Tomorrow<br>
                    <small>Biodegradable • 6:00 AM</small>
                </div>

                <div class="bg-white p-2 rounded mb-2">
                    Friday<br>
                    <small>Non-Biodegradable • 6:00 AM</small>
                </div>

                <div class="bg-white p-2 rounded">
                    Next Monday<br>
                    <small>Recyclable • 7:00 AM</small>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
let notifications = [
{
id:1,
title:"Tomorrow's Collection Reminder",
message:"Biodegradable waste collection tomorrow at 6:00 AM",
type:"reminder",
time:"2 hours ago",
read:false,
barangay:"San Jose"
},
{
id:2,
title:"Collection Today!",
message:"Non-biodegradable collection today.",
type:"alert",
time:"5 hours ago",
read:false,
barangay:"San Jose"
},
{
id:3,
title:"Schedule Updated",
message:"Friday moved to 7:00 AM",
type:"update",
time:"1 day ago",
read:true,
barangay:"San Jose"
}
];

function getColor(type){
if(type==="reminder") return "bg-blue-100 text-blue-800";
if(type==="alert") return "bg-orange-100 text-orange-800";
if(type==="update") return "bg-green-100 text-green-800";
return "bg-gray-100";
}

function render(){
const container=document.getElementById("notifications");
container.innerHTML="";

const unread=notifications.filter(n=>!n.read).length;

const badge=document.getElementById("badge");
const btn=document.getElementById("markAllBtn");

if(unread>0){
badge.classList.remove("hidden");
badge.innerText=unread+" new";
btn.classList.remove("hidden");
}else{
badge.classList.add("hidden");
btn.classList.add("hidden");
}

if(notifications.length===0){
container.innerHTML="<p class='text-gray-500'>No notifications</p>";
return;
}

notifications.forEach(n=>{
container.innerHTML+=`
<div class="p-4 rounded-lg border ${n.read?"bg-white":"bg-green-50 border-green-300"}">
    <div class="flex justify-between">
        <div>
            <h3 class="font-bold">${n.title}</h3>
            <span class="text-xs px-2 py-1 rounded ${getColor(n.type)}">${n.type}</span>
            <p class="text-sm mt-2">${n.message}</p>
            <p class="text-xs text-gray-500 mt-2">📍 ${n.barangay} • ⏰ ${n.time}</p>
        </div>

        <div>
            ${!n.read ? `<button onclick="markRead(${n.id})">✔</button>` : ""}
            <button onclick="removeItem(${n.id})">🗑️</button>
        </div>
    </div>
</div>
`;
});
}

function markRead(id){
notifications=notifications.map(n=>n.id===id?{...n,read:true}:n);
render();
}

function markAllAsRead(){
notifications=notifications.map(n=>({...n,read:true}));
render();
}

function removeItem(id){
notifications=notifications.filter(n=>n.id!==id);
render();
}

render();
</script>

</body>
</html>
